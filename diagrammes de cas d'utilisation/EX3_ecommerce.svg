<svg xmlns="http://www.w3.org/2000/svg" width="900" height="760" viewBox="0 0 900 760" font-family="Arial, sans-serif">
  <defs>
    <marker id="triGen" markerWidth="16" markerHeight="16" refX="13" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L13,6 L0,12 Z" fill="white" stroke="#16213e" stroke-width="1.3"/>
    </marker>
    <marker id="arrOpen" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#16213e" stroke-width="1.4"/>
    </marker>
    <g id="actor">
      <circle cx="0" cy="0" r="9" fill="white" stroke="#1f6fa8" stroke-width="2"/>
      <line x1="0" y1="9" x2="0" y2="38" stroke="#1f6fa8" stroke-width="2"/>
      <line x1="-14" y1="18" x2="14" y2="18" stroke="#1f6fa8" stroke-width="2"/>
      <line x1="0" y1="38" x2="-13" y2="58" stroke="#1f6fa8" stroke-width="2"/>
      <line x1="0" y1="38" x2="13" y2="58" stroke="#1f6fa8" stroke-width="2"/>
    </g>
  </defs>

  <rect width="900" height="760" fill="white"/>

  <!-- System boundary -->
  <rect x="160" y="20" width="680" height="700" fill="none" stroke="#33449b" stroke-width="2"/>
  <text x="500" y="52" text-anchor="middle" font-size="19" font-style="italic" font-weight="bold" fill="#cc3377">Site e-commerce</text>

  <!-- ================= Actors ================= -->
  <use href="#actor" x="70" y="160"/>
  <text x="70" y="275" text-anchor="middle" font-size="13">Visiteur</text>

  <use href="#actor" x="70" y="480"/>
  <text x="70" y="595" text-anchor="middle" font-size="13">Client</text>

  <!-- ================= Use cases : Column A ================= -->
  <ellipse cx="420" cy="160" rx="95" ry="40" fill="#d9f2fb" stroke="#1f6fa8" stroke-width="2"/>
  <text x="420" y="166" text-anchor="middle" font-size="13">Explorer les articles</text>

  <ellipse cx="420" cy="290" rx="95" ry="40" fill="#d9f2fb" stroke="#1f6fa8" stroke-width="2"/>
  <text x="420" y="286" text-anchor="middle" font-size="12">Ajouter des produits</text>
  <text x="420" y="302" text-anchor="middle" font-size="12">au panier</text>

  <ellipse cx="420" cy="420" rx="95" ry="40" fill="#d9f2fb" stroke="#1f6fa8" stroke-width="2"/>
  <text x="420" y="426" text-anchor="middle" font-size="13">Passer une commande</text>

  <ellipse cx="420" cy="550" rx="95" ry="40" fill="#d9f2fb" stroke="#1f6fa8" stroke-width="2"/>
  <text x="420" y="546" text-anchor="middle" font-size="12">Consulter historique</text>
  <text x="420" y="562" text-anchor="middle" font-size="12">des commandes</text>

  <ellipse cx="420" cy="670" rx="95" ry="40" fill="#d9f2fb" stroke="#1f6fa8" stroke-width="2"/>
  <text x="420" y="676" text-anchor="middle" font-size="13">Gerer son compte</text>

  <!-- ================= Use cases : Column B ================= -->
  <ellipse cx="680" cy="160" rx="95" ry="40" fill="#d9f2fb" stroke="#1f6fa8" stroke-width="2"/>
  <text x="680" y="156" text-anchor="middle" font-size="12">Voir les details</text>
  <text x="680" y="172" text-anchor="middle" font-size="12">d'un article</text>

  <ellipse cx="680" cy="420" rx="95" ry="40" fill="#d9f2fb" stroke="#1f6fa8" stroke-width="2"/>
  <text x="680" y="426" text-anchor="middle" font-size="13">S'authentifier</text>

  <!-- ================= Connectors (drawn last, on top) ================= -->
  <!-- Generalization: Client is a specialization of Visiteur -->
  <line x1="40" y1="512" x2="40" y2="248" stroke="#16213e" stroke-width="1.5" marker-end="url(#triGen)"/>

  <!-- Associations -->
  <line x1="84" y1="158" x2="325" y2="160" stroke="#16213e" stroke-width="1.5"/>
  <line x1="84" y1="440" x2="328" y2="295" stroke="#16213e" stroke-width="1.5"/>
  <line x1="84" y1="468" x2="328" y2="420" stroke="#16213e" stroke-width="1.5"/>
  <line x1="84" y1="500" x2="328" y2="545" stroke="#16213e" stroke-width="1.5"/>
  <line x1="84" y1="525" x2="328" y2="655" stroke="#16213e" stroke-width="1.5"/>

  <!-- Extend: Voir les details d'un article extends Explorer les articles -->
  <line x1="585" y1="160" x2="518" y2="160" stroke="#16213e" stroke-width="1.4" stroke-dasharray="7,5" marker-end="url(#arrOpen)"/>
  <rect x="516" y="140" width="82" height="16" fill="white"/>
  <text x="557" y="152" text-anchor="middle" font-size="11" font-style="italic">&lt;&lt;extend&gt;&gt;</text>

  <!-- Include: 4 use cases include S'authentifier -->
  <line x1="515" y1="300" x2="588" y2="405" stroke="#16213e" stroke-width="1.4" stroke-dasharray="7,5" marker-end="url(#arrOpen)"/>
  <rect x="500" y="335" width="84" height="16" fill="white"/>
  <text x="542" y="347" text-anchor="middle" font-size="11" font-style="italic">&lt;&lt;include&gt;&gt;</text>

  <line x1="515" y1="420" x2="585" y2="420" stroke="#16213e" stroke-width="1.4" stroke-dasharray="7,5" marker-end="url(#arrOpen)"/>
  <rect x="510" y="400" width="84" height="16" fill="white"/>
  <text x="552" y="412" text-anchor="middle" font-size="11" font-style="italic">&lt;&lt;include&gt;&gt;</text>

  <line x1="515" y1="540" x2="588" y2="435" stroke="#16213e" stroke-width="1.4" stroke-dasharray="7,5" marker-end="url(#arrOpen)"/>
  <rect x="500" y="470" width="84" height="16" fill="white"/>
  <text x="542" y="482" text-anchor="middle" font-size="11" font-style="italic">&lt;&lt;include&gt;&gt;</text>

  <line x1="515" y1="655" x2="588" y2="448" stroke="#16213e" stroke-width="1.4" stroke-dasharray="7,5" marker-end="url(#arrOpen)"/>
  <rect x="500" y="555" width="84" height="16" fill="white"/>
  <text x="542" y="567" text-anchor="middle" font-size="11" font-style="italic">&lt;&lt;include&gt;&gt;</text>
</svg>
