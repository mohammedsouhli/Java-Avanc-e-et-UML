<svg xmlns="http://www.w3.org/2000/svg" width="920" height="700" viewBox="0 0 920 700" font-family="Arial, sans-serif">
  <defs>
    <g id="actor">
      <circle cx="0" cy="0" r="9" fill="white" stroke="#1f6fa8" stroke-width="2"/>
      <line x1="0" y1="9" x2="0" y2="38" stroke="#1f6fa8" stroke-width="2"/>
      <line x1="-14" y1="18" x2="14" y2="18" stroke="#1f6fa8" stroke-width="2"/>
      <line x1="0" y1="38" x2="-13" y2="58" stroke="#1f6fa8" stroke-width="2"/>
      <line x1="0" y1="38" x2="13" y2="58" stroke="#1f6fa8" stroke-width="2"/>
    </g>
  </defs>

  <rect width="920" height="700" fill="white"/>

  <!-- System boundary -->
  <rect x="160" y="20" width="680" height="640" fill="none" stroke="#33449b" stroke-width="2"/>
  <text x="500" y="52" text-anchor="middle" font-size="19" font-style="italic" font-weight="bold" fill="#cc3377">Systeme de gestion des voyages</text>

  <!-- Note (UML note shape, folded corner) -->
  <path d="M620,40 L804,40 L820,56 L820,110 L620,110 Z" fill="#fffef2" stroke="#999966" stroke-width="1.3"/>
  <path d="M804,40 L804,56 L820,56" fill="none" stroke="#999966" stroke-width="1.3"/>
  <text x="720" y="65" text-anchor="middle" font-size="11">Tous les cas d'utilisation</text>
  <text x="720" y="80" text-anchor="middle" font-size="11">incluent "S'authentifier"</text>

  <!-- ================= Actors ================= -->
  <use href="#actor" x="70" y="105"/>
  <text x="70" y="220" text-anchor="middle" font-size="13">Client</text>

  <use href="#actor" x="70" y="305"/>
  <text x="70" y="420" text-anchor="middle" font-size="13">Agent</text>

  <use href="#actor" x="70" y="485"/>
  <text x="70" y="600" text-anchor="middle" font-size="12">Administrateur</text>

  <!-- ================= Use cases : Column A ================= -->
  <ellipse cx="420" cy="100" rx="95" ry="40" fill="#d9f2fb" stroke="#1f6fa8" stroke-width="2"/>
  <text x="420" y="96" text-anchor="middle" font-size="12">Consulter les offres</text>
  <text x="420" y="112" text-anchor="middle" font-size="12">de voyage</text>

  <ellipse cx="420" cy="240" rx="95" ry="40" fill="#d9f2fb" stroke="#1f6fa8" stroke-width="2"/>
  <text x="420" y="236" text-anchor="middle" font-size="12">Effectuer des</text>
  <text x="420" y="252" text-anchor="middle" font-size="12">reservations</text>

  <ellipse cx="420" cy="380" rx="95" ry="40" fill="#d9f2fb" stroke="#1f6fa8" stroke-width="2"/>
  <text x="420" y="376" text-anchor="middle" font-size="12">Consulter les</text>
  <text x="420" y="392" text-anchor="middle" font-size="12">reservations effectuees</text>

  <ellipse cx="420" cy="520" rx="95" ry="40" fill="#d9f2fb" stroke="#1f6fa8" stroke-width="2"/>
  <text x="420" y="516" text-anchor="middle" font-size="12">Gestion globale</text>
  <text x="420" y="532" text-anchor="middle" font-size="12">du systeme</text>

  <!-- ================= Use cases : Column B ================= -->
  <ellipse cx="680" cy="170" rx="95" ry="40" fill="#d9f2fb" stroke="#1f6fa8" stroke-width="2"/>
  <text x="680" y="166" text-anchor="middle" font-size="12">Consulter l'historique</text>
  <text x="680" y="182" text-anchor="middle" font-size="12">des voyages</text>

  <ellipse cx="680" cy="310" rx="95" ry="40" fill="#d9f2fb" stroke="#1f6fa8" stroke-width="2"/>
  <text x="680" y="306" text-anchor="middle" font-size="12">Modifier les details</text>
  <text x="680" y="322" text-anchor="middle" font-size="12">des voyages</text>

  <ellipse cx="680" cy="450" rx="95" ry="40" fill="#d9f2fb" stroke="#1f6fa8" stroke-width="2"/>
  <text x="680" y="446" text-anchor="middle" font-size="12">Ajouter de nouvelles</text>
  <text x="680" y="462" text-anchor="middle" font-size="12">offres de voyage</text>

  <ellipse cx="680" cy="560" rx="95" ry="40" fill="#d9f2fb" stroke="#1f6fa8" stroke-width="2"/>
  <text x="680" y="556" text-anchor="middle" font-size="12">Gerer les comptes</text>
  <text x="680" y="572" text-anchor="middle" font-size="12">utilisateurs</text>

  <!-- ================= Connectors (drawn last, on top) ================= -->
  <line x1="84" y1="128" x2="245" y2="105" stroke="#16213e" stroke-width="1.5"/>
  <line x1="84" y1="150" x2="270" y2="235" stroke="#16213e" stroke-width="1.5"/>
  <line x1="84" y1="140" x2="510" y2="172" stroke="#16213e" stroke-width="1.5"/>
  <line x1="84" y1="360" x2="270" y2="378" stroke="#16213e" stroke-width="1.5"/>
  <line x1="84" y1="335" x2="510" y2="312" stroke="#16213e" stroke-width="1.5"/>
  <line x1="84" y1="345" x2="510" y2="448" stroke="#16213e" stroke-width="1.5"/>
  <line x1="84" y1="510" x2="270" y2="518" stroke="#16213e" stroke-width="1.5"/>
  <line x1="84" y1="530" x2="510" y2="558" stroke="#16213e" stroke-width="1.5"/>
</svg>
