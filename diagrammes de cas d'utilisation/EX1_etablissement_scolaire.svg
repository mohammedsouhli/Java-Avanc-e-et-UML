<svg xmlns="http://www.w3.org/2000/svg" width="980" height="720" viewBox="0 0 980 720" font-family="Arial, sans-serif">
  <defs>
    <marker id="triGen" markerWidth="16" markerHeight="16" refX="13" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L13,6 L0,12 Z" fill="white" stroke="#16213e" stroke-width="1.3"/>
    </marker>
    <marker id="arrOpen" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#16213e" stroke-width="1.4"/>
    </marker>
    <g id="actor">
      <circle cx="0" cy="0" r="9" fill="white" stroke="#1f6fa8" stroke-width="2"/>
      <line x1="0" y1="9" x2="0" y2="38" stroke="#1f6fa8" stroke-width="2"/>
      <line x1="-14" y1="18" x2="14" y2="18" stroke="#1f6fa8" stroke-width="2"/>
      <line x1="0" y1="38" x2="-13" y2="58" stroke="#1f6fa8" stroke-width="2"/>
      <line x1="0" y1="38" x2="13" y2="58" stroke="#1f6fa8" stroke-width="2"/>
    </g>
  </defs>

  <rect width="980" height="720" fill="white"/>

  <!-- System boundary -->
  <rect x="160" y="20" width="800" height="660" fill="none" stroke="#33449b" stroke-width="2"/>
  <text x="560" y="52" text-anchor="middle" font-size="19" font-style="italic" font-weight="bold" fill="#cc3377">Gestion de reservation</text>

  <!-- ================= Actors (drawn before connectors) ================= -->
  <use href="#actor" x="70" y="80"/>
  <text x="70" y="195" text-anchor="middle" font-size="13">Enseignant</text>

  <use href="#actor" x="70" y="340"/>
  <text x="70" y="455" text-anchor="middle" font-size="13">Etudiant</text>

  <use href="#actor" x="70" y="558"/>
  <text x="70" y="673" text-anchor="middle" font-size="12">Enseignant responsable</text>

  <!-- ================= Use cases (drawn before connectors) ================= -->
  <!-- Column A -->
  <ellipse cx="340" cy="110" rx="95" ry="40" fill="#d9f2fb" stroke="#1f6fa8" stroke-width="2"/>
  <text x="340" y="106" text-anchor="middle" font-size="13">Consulter le</text>
  <text x="340" y="122" text-anchor="middle" font-size="13">recap horaire</text>

  <ellipse cx="340" cy="260" rx="95" ry="40" fill="#d9f2fb" stroke="#1f6fa8" stroke-width="2"/>
  <text x="340" y="266" text-anchor="middle" font-size="15" font-weight="bold">Reserver</text>

  <ellipse cx="340" cy="390" rx="95" ry="40" fill="#d9f2fb" stroke="#1f6fa8" stroke-width="2"/>
  <text x="340" y="386" text-anchor="middle" font-size="12">Verifier la disponibilite</text>
  <text x="340" y="402" text-anchor="middle" font-size="12">de la salle / du materiel</text>

  <ellipse cx="340" cy="520" rx="95" ry="40" fill="#d9f2fb" stroke="#1f6fa8" stroke-width="2"/>
  <text x="340" y="526" text-anchor="middle" font-size="13">Consulter le planning</text>

  <!-- Column B -->
  <ellipse cx="580" cy="190" rx="95" ry="40" fill="#d9f2fb" stroke="#1f6fa8" stroke-width="2"/>
  <text x="580" y="196" text-anchor="middle" font-size="13">Reserver une salle</text>

  <ellipse cx="580" cy="330" rx="95" ry="40" fill="#d9f2fb" stroke="#1f6fa8" stroke-width="2"/>
  <text x="580" y="336" text-anchor="middle" font-size="13">Reserver du materiel</text>

  <ellipse cx="580" cy="610" rx="95" ry="40" fill="#d9f2fb" stroke="#1f6fa8" stroke-width="2"/>
  <text x="580" y="606" text-anchor="middle" font-size="12">Editer le</text>
  <text x="580" y="622" text-anchor="middle" font-size="12">recapitulatif horaire</text>

  <!-- Column C -->
  <ellipse cx="810" cy="260" rx="95" ry="40" fill="#d9f2fb" stroke="#1f6fa8" stroke-width="2"/>
  <text x="810" y="256" text-anchor="middle" font-size="12">Reserver un</text>
  <text x="810" y="272" text-anchor="middle" font-size="12">ordinateur portable</text>

  <ellipse cx="810" cy="410" rx="95" ry="40" fill="#d9f2fb" stroke="#1f6fa8" stroke-width="2"/>
  <text x="810" y="406" text-anchor="middle" font-size="12">Reserver video</text>
  <text x="810" y="422" text-anchor="middle" font-size="12">projecteur</text>

  <!-- ================= Connectors (drawn last, on top) ================= -->
  <!-- Associations -->
  <line x1="84" y1="112" x2="245" y2="110" stroke="#16213e" stroke-width="1.5"/>
  <line x1="84" y1="130" x2="278" y2="242" stroke="#16213e" stroke-width="1.5"/>
  <line x1="84" y1="145" x2="270" y2="510" stroke="#16213e" stroke-width="1.5"/>
  <line x1="84" y1="390" x2="270" y2="530" stroke="#16213e" stroke-width="1.5"/>
  <line x1="84" y1="608" x2="500" y2="610" stroke="#16213e" stroke-width="1.5"/>

  <!-- Generalizations (hollow triangle points to the general/base element) -->
  <line x1="40" y1="590" x2="40" y2="168" stroke="#16213e" stroke-width="1.5" marker-end="url(#triGen)"/>
  <line x1="490" y1="190" x2="405" y2="235" stroke="#16213e" stroke-width="1.5" marker-end="url(#triGen)"/>
  <line x1="490" y1="325" x2="405" y2="265" stroke="#16213e" stroke-width="1.5" marker-end="url(#triGen)"/>
  <line x1="720" y1="255" x2="640" y2="315" stroke="#16213e" stroke-width="1.5" marker-end="url(#triGen)"/>
  <line x1="720" y1="405" x2="640" y2="350" stroke="#16213e" stroke-width="1.5" marker-end="url(#triGen)"/>

  <!-- Include -->
  <line x1="340" y1="292" x2="340" y2="348" stroke="#16213e" stroke-width="1.4" stroke-dasharray="7,5" marker-end="url(#arrOpen)"/>
  <rect x="298" y="308" width="84" height="18" fill="white"/>
  <text x="340" y="321" text-anchor="middle" font-size="12" font-style="italic">&lt;&lt;include&gt;&gt;</text>
</svg>
